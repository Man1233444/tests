<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dizzy Lab - Fullscreen Clear Screen</title>
<style>
html, body {
  margin: 0; padding: 0; overflow: hidden;
  background: black; color: white; font-family: Arial, sans-serif;
  height: 100%; width: 100%; text-align: center;
}

h1 {
  margin: 20px; position: relative; z-index: 10;
}

.illusion {
  position: absolute; top: 50%; left: 50%;
  width: 1000px; height: 1000px;
  margin-left: -500px; margin-top: -500px;
  border-radius: 50%;
  background: repeating-conic-gradient(white 0deg 10deg, black 10deg 20deg);
  animation: spin 5s linear infinite;
  z-index: 0;
}

@keyframes spin {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.15); }
  100% { transform: rotate(360deg) scale(1.2); }
}

.controls {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 10px;
}

button, input {
  margin: 5px; padding: 10px; font-size: 16px;
}
</style>
</head>
<body>

<h1>Dizzy Lab Extended 🌌🔊</h1>

<div class="illusion"></div>

<div class="controls" id="controls">
  <label>Frequency (Hz): </label>
  <input type="range" id="freq" min="20" max="120" value="40">
  <span id="freqVal">40</span> Hz
  <br>
  <label>Pulsing Speed: </label>
  <input type="range" id="pulse" min="1" max="10" value="3">
  <span id="pulseVal">3</span>
  <br>
  <label>Rotation Speed (Hz): </label>
  <input type="range" id="rotate" min="0.1" max="2" step="0.1" value="0.5">
  <span id="rotateVal">0.5</span>
  <br>
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
  <button onclick="toggleFullscreen()">Fullscreen</button>
  <button onclick="clearScreen()">Clear Screen</button>
</div>

<script>
let audioCtx, oscillator, gainNode, panNode;
let pulseInterval, rotateRAF, variationRAF;
let baseAngle = 0;

const freqSlider = document.getElementById("freq");
const freqVal = document.getElementById("freqVal");
const pulseSlider = document.getElementById("pulse");
const pulseVal = document.getElementById("pulseVal");
const rotateSlider = document.getElementById("rotate");
const rotateVal = document.getElementById("rotateVal");
const controlsDiv = document.getElementById("controls");

freqSlider.oninput = () => {
  freqVal.textContent = freqSlider.value;
  if (oscillator) oscillator.frequency.setValueAtTime(freqSlider.value, audioCtx.currentTime);
};
pulseSlider.oninput = () => { pulseVal.textContent = pulseSlider.value; };
rotateSlider.oninput = () => { rotateVal.textContent = rotateSlider.value; };

// Start audio + visual variation
function start() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  oscillator = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();
  panNode = audioCtx.createStereoPanner();

  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(freqSlider.value, audioCtx.currentTime);

  oscillator.connect(gainNode);
  gainNode.connect(panNode);
  panNode.connect(audioCtx.destination);
  oscillator.start();

  // Pulsing effect
  pulseInterval = setInterval(() => {
    const time = Date.now() * 0.001;
    const pulseValue = 0.3 + 0.2 * Math.sin(time * pulseSlider.value);
    gainNode.gain.setValueAtTime(pulseValue, audioCtx.currentTime);
  }, 50);

  // Stereo rotation + continuous variation
  function rotateSound() {
    const time = Date.now() * 0.001;
    baseAngle += 0.01 * rotateSlider.value;
    const pan = Math.sin(baseAngle + 0.2 * Math.sin(time * 0.05));
    panNode.pan.setValueAtTime(pan, audioCtx.currentTime);
    rotateRAF = requestAnimationFrame(rotateSound);
  }
  rotateSound();

  // Slowly modulate frequency for long-term variation
  function varyFrequency() {
    const time = Date.now() * 0.001;
    const mod = 5 * Math.sin(time * 0.02); 
    oscillator.frequency.setValueAtTime(parseFloat(freqSlider.value) + mod, audioCtx.currentTime);
    variationRAF = requestAnimationFrame(varyFrequency);
  }
  varyFrequency();
}

// Stop all
function stop() {
  if (oscillator) { oscillator.stop(); oscillator.disconnect(); oscillator = null; }
  if (pulseInterval) { clearInterval(pulseInterval); }
  if (rotateRAF) { cancelAnimationFrame(rotateRAF); }
  if (variationRAF) { cancelAnimationFrame(variationRAF); }
}

// Fullscreen toggle
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// Clear / Hide controls
function clearScreen() {
  if (controlsDiv.style.display === "none") {
    controlsDiv.style.display = "block";
    document.querySelector("h1").style.display = "block";
  } else {
    controlsDiv.style.display = "none";
    document.querySelector("h1").style.display = "none";
  }
}
</script>

</body>
</html>
